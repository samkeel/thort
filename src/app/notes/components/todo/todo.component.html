<section>
  <div fxLayout="row wrap" fxLayoutAlign="center center">
    <h2 fxFlex.lt-sm="90" fxFlex.lt-md="80" fxFlex="70">Todo</h2>
    <mat-card
      class="mat-elevation-z4"
      fxFlex.lt-sm="90"
      fxFlex.lt-md="80"
      fxFlex="70"
    >
      <mat-card-content>
        <form [formGroup]="newTodoForm">
          <mat-form-field color="accent" appearance="fill" class="full-width">
            <mat-label>What needs to be done?</mat-label>
            <input
              matInput
              formControlName="description"
              #todoDescription
              (keyup.enter)="onSubmit()"
            />
          </mat-form-field>
        </form>
        <!--  -->
        <div *ngFor="let todo of todos; let i = index">
          <mat-divider [inset]="true"></mat-divider>
          <div fxLayout="row" fxLayoutAlign="start start">
            <mat-checkbox fxFlex="90" [checked]="todo.isCompleted" (change)="completedClick(todo)">{{ todo.description }}</mat-checkbox>
            <div class="btn-container" fxLayoutAlign="end end">
              <button mat-mini-fab color="warn">
                <mat-icon (click)="deleteClick(todo.id)">clear</mat-icon>
              </button>
            </div>
          </div>
        </div>
        <!--  -->
      </mat-card-content>
    </mat-card>
  </div>
</section>
