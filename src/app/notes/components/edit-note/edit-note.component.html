<section class="container">
  <div fxLayout="row wrap" fxLayoutAlign="center center">
    <mat-card
      class="mat-elevation-z4"
      fxFlex.lt-sm="90"
      fxFlex.lt-md="80"
      fxFlex="70"
    >
      <mat-card-header><h2>Edit note</h2></mat-card-header>
      <mat-card-content>
        <form>
          <!-- Category -->
          <mat-form-field color="accent">
            <mat-label>Select</mat-label>
            <mat-select placeholder="Category">
              <mat-option value="test_cat_1">Test Category 1</mat-option>
              <mat-option value="test_cat_2">Test Category 2</mat-option>
            </mat-select>
          </mat-form-field>
          <!-- Title  -->
          <mat-form-field color="accent" appearance="fill">
            <mat-label>Note Title</mat-label>
            <input matInput placeholder="Title" />
          </mat-form-field>
          <!--  -->
        </form>
      </mat-card-content>
      <mat-divider inset></mat-divider>
      <mat-card-actions align="end" fxLayout="row" fxLayoutGap="10px">
        <button mat-mini-fab color="primary">
          <mat-icon (click)="backClick()">arrow_back</mat-icon>
        </button>
        <div fxFlex></div>
        <button mat-mini-fab color="warn">
          <mat-icon (click)="cancelClick()">clear</mat-icon>
        </button>
      </mat-card-actions>
    </mat-card>
  </div>
</section>
